version: '3'

services:
  LifeGemPostgres:
    image: postgres:18
    container_name: lifegem-pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_master:/var/lib/postgresql

volumes:
  postgres_data_master:
